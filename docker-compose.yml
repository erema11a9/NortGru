version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nortgru-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12393qwe}
      POSTGRES_DB: ${POSTGRES_DB:-nortgru_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nortgru-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-12393qwe}@db:5432/${POSTGRES_DB:-nortgru_db}
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://127.0.0.1,http://localhost:5173"
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/chat}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      ONEC_BASE_URL: ${ONEC_BASE_URL:-http://host.docker.internal:8081/InfoBase4/hs/edu-agent}
      ONEC_USER: ${ONEC_USER:-admin}
      ONEC_PASSWORD: ${ONEC_PASSWORD:-PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nortgru-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
