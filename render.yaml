services:
  # 1. Фронтенд (Статический сайт Vue / Vite)
  - type: web
    name: nortgru-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nortgru-backend
          type: web
          property: host

  # 2. Бэкенд (FastAPI Web Service)
  - type: web
    name: nortgru-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nortgru-db
          property: connectionString

# 3. База данных (PostgreSQL)
databases:
  - name: nortgru-db
    plan: free
